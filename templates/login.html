{% extends 'base.html' %}
{% block content %}
    <h2>Login</h2>
    <form method="POST">
        {{ form.hidden_tag() }}
        {{ form.email.label }} {{ form.email(placeholder="Enter your email") }}<br>
        {{ form.password.label }} {{ form.password(placeholder="Enter your password") }}<br>
        {{ form.submit(class_="btn btn-primary") }}
    </form>
{% endblock %}
